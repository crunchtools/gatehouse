# Gatehouse dogfoods its own fork-safe review on EVERY PR — internal or external.
#
# This is the exact pattern shipped to adopters in examples/gatehouse.yml, except
# it references the reusable workflow locally (./.github/workflows/review.yml)
# instead of by tag. pull_request_target runs the trusted base-branch version of
# these files, so a PR can neither disable the guard nor tamper with the reviewer.

name: Gatehouse

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions: {}   # default-deny; each job grants only what it needs

jobs:
  # 1) Reject PRs from outside contributors that modify workflow files.
  guard:
    name: Protect workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Reject workflow changes from untrusted PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
        run: |
          set -euo pipefail
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Author '$AUTHOR_ASSOC' is trusted; allowing."; exit 0 ;;
          esac
          changed="$(gh pr diff "$PR" --repo "$GITHUB_REPOSITORY" --name-only)"
          if echo "$changed" | grep -qE '^\.github/workflows/'; then
            echo "::error::PR modifies .github/workflows/ — not accepted from external contributors."
            gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
              $'🚫 **Workflow changes are not accepted via pull request.** Please open an issue and a maintainer will make the change.'
            exit 1
          fi
          echo "No workflow files changed."

  # 2) Review the PR diff (no checkout, BYO key) via the reusable workflow.
  review:
    name: Gatehouse review
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/review.yml
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
