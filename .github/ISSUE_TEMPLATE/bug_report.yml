name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `gatehouse --base main`
        2. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if available.
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation Method
      description: How are you running gatehouse?
      options:
        - uv tool install
        - pipx install
        - Container (podman run)
        - From source (uv sync)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `gatehouse --help` header or check pyproject.toml
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (logs, git state, environment)
